services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    volumes:
      - .:/var/www
    networks:
      - laravel

  backend-nginx:
    image: nginx:alpine
    container_name: nginx_web
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  backend-db:
    image: mariadb:10.5
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8000:80"
    environment:
      PMA_HOST: backend-db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - backend-db
    networks:
      - laravel

volumes:
  dbdata:

networks:
  laravel:
    driver: bridge
